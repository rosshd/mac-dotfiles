# ── Prefix ────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Pane splits (no prefix needed) ───────────────────────────────────────
bind -n C-\\ split-window -h -c "#{pane_current_path}"
bind -n C-- split-window -v  -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane borders — always orange, label shows active ─────────────────────
set -g pane-border-style        'fg=colour214'
set -g pane-active-border-style 'fg=colour214'
set -g pane-border-lines        single
set -g pane-border-status       top
set -g pane-border-format       '#{?pane_active,#[fg=colour214 bold] ● #[fg=colour214]#{b:pane_current_path} ,#[fg=colour238] ○ #[fg=colour238]#{b:pane_current_path} }'

# ── Pane sizing ───────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Session / window management ───────────────────────────────────────────
bind -n C-t new-window   -c "#{pane_current_path}"
bind -n C-w kill-pane
bind -n C-n next-window
bind -n C-p previous-window
bind S choose-session
bind X kill-window

# ── General ───────────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
bind r source-file ~/.tmux.conf \; display "  reloaded"

# ── Shell ─────────────────────────────────────────────────────────────────
set -g default-shell /opt/homebrew/bin/fish

# ── True color ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Status bar ────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=default fg=colour214'

set -g status-left-length 30
set -g status-left '#[fg=colour214,bold] #S #[fg=colour238]│ '

setw -g window-status-format         '#[fg=colour238,bg=default] #I:#W '
setw -g window-status-current-format '#[fg=colour214,bold,bg=default] #I:#W '
setw -g window-status-separator      ''

set -g status-right-length 60
set -g status-right '#[fg=colour238]│ #[fg=colour109]#{b:pane_current_path} #[fg=colour238]│ #[fg=colour214]%H:%M #[fg=colour238]%d %b '
